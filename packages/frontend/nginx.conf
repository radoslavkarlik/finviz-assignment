server {
    listen ${PORT};
    server_name localhost;

    absolute_redirect off;
    port_in_redirect off;

    # Where your static files are located
    root /usr/share/nginx/html;
    index index.html;

    # Optional: Enable Gzip compression to make your site load faster
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    gzip_disable "MSIE [1-6]\.";

    # Cache static assets (images, fonts) for better performance
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Proxy all /api requests to the backend
    location ~ ^/api {
        resolver 8.8.8.8 valid=30s;
        set $backend "https://finviz-assignmentbackend-production.up.railway.app";

        proxy_pass $backend$request_uri;
        
        proxy_http_version 1.1;
        proxy_set_header Host finviz-assignmentbackend-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SNI is required for Railway/Cloudflare/Managed SSL
        proxy_ssl_server_name on;
        proxy_ssl_session_reuse off;
        
        # This stops Nginx from redirecting and adding the :8080 port
        proxy_redirect off;
    }
}